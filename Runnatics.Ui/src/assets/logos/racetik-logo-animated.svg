<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" width="520" height="150">
<style>
  @keyframes lane1 { 0% { stroke-dashoffset: 200; opacity: 0; } 40% { opacity: 0.3; } 100% { stroke-dashoffset: 0; opacity: 0.3; } }
  @keyframes lane2 { 0% { stroke-dashoffset: 200; opacity: 0; } 40% { opacity: 0.55; } 100% { stroke-dashoffset: 0; opacity: 0.55; } }
  @keyframes lane3 { 0% { stroke-dashoffset: 200; opacity: 0; } 40% { opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 1; } }
  @keyframes dot-pop { 0% { r: 0; opacity: 0; } 70% { r: 10; opacity: 1; } 100% { r: 7.5; opacity: 1; } }
  @keyframes check-draw { 0% { stroke-dashoffset: 30; } 100% { stroke-dashoffset: 0; } }
  @keyframes pulse-ring { 0% { r: 7.5; opacity: 0.5; } 100% { r: 18; opacity: 0; } }
  @keyframes text-slide { 0% { opacity: 0; transform: translateX(-15px); } 100% { opacity: 1; transform: translateX(0); } }
  @keyframes underline-draw { 0% { stroke-dashoffset: 360; } 100% { stroke-dashoffset: 0; } }
  @keyframes tagline-fade { 0% { opacity: 0; } 100% { opacity: 1; } }
  .l1 { stroke-dasharray: 200; animation: lane1 0.8s ease-out 0.2s both; }
  .l2 { stroke-dasharray: 200; animation: lane2 0.8s ease-out 0.5s both; }
  .l3 { stroke-dasharray: 200; animation: lane3 0.8s ease-out 0.8s both; }
  .finish-dot { animation: dot-pop 0.4s ease-out 1.5s both; }
  .finish-check { stroke-dasharray: 30; animation: check-draw 0.3s ease-out 1.8s both; }
  .pulse { animation: pulse-ring 1s ease-out 1.5s both; }
  .race-text { animation: text-slide 0.5s ease-out 1.1s both; }
  .tik-text { animation: text-slide 0.5s ease-out 1.3s both; }
  .underline { stroke-dasharray: 360; animation: underline-draw 0.6s ease-out 1.6s both; }
  .tagline { animation: tagline-fade 0.5s ease-out 2s both; }
</style>
<defs>
  <linearGradient id="ug" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#e8491d"/>
    <stop offset="100%" stop-color="#ff6b35"/>
  </linearGradient>
</defs>
<g transform="translate(12, 18)">
  <path class="l1" d="M5,58 Q30,5 65,18 Q88,28 98,14" fill="none" stroke="#e8491d" stroke-width="6" stroke-linecap="round"/>
  <path class="l2" d="M10,68 Q38,18 72,34 Q92,42 102,28" fill="none" stroke="#e8491d" stroke-width="6" stroke-linecap="round"/>
  <path class="l3" d="M15,78 Q42,30 78,48 Q96,56 106,42" fill="none" stroke="#ff6b35" stroke-width="6" stroke-linecap="round"/>
  <circle class="pulse" cx="106" cy="42" r="7.5" fill="none" stroke="#ff6b35" stroke-width="1.5"/>
  <circle class="finish-dot" cx="106" cy="42" r="7.5" fill="#2d9e4f"/>
  <path class="finish-check" d="M101,42 L105,47 L113,36" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<text class="race-text" x="130" y="82" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="4" fill="#1a1a2e">RACE</text>
<text class="tik-text" x="350" y="82" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="4" fill="#e8491d">TIK</text>
<line class="underline" x1="130" y1="96" x2="488" y2="96" stroke="url(#ug)" stroke-width="3" stroke-linecap="round"/>
<text class="tagline" x="130" y="122" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" letter-spacing="6" fill="#888899">TIMING · RESULTS · EVENTS</text>
</svg>
